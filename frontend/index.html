<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOREAL COMMAND PORTAL | SAAB HACKATHON</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        .portal-overlay {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .portal-card {
            background: rgba(10, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
            max-width: 800px;
        }

        .portal-card h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.3rem;
        }

        .portal-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .option-btn {
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .option-btn:hover {
            background: var(--accent-blue);
            color: black;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 242, 255, 0.4);
        }

        .option-btn h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .option-btn p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .option-btn:hover p {
            color: rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <video autoplay muted loop id="bg-video">
        <source src="video/Military_Command_Dashboard_Video_Generation.mp4" type="video/mp4">
    </video>

    <div class="portal-overlay">
        <div class="portal-card">
            <h1>STRATEGIC PORTAL</h1>
            <div class="portal-options">
                <a href="dashboard.html?mode=boreal" class="option-btn">
                    <h2>BOREAL BASELINE</h2>
                    <p>Standardized Baltic engagement theatre. Heuristic audit & baseline logic.</p>
                </a>
                <a href="dashboard.html?mode=sweden" class="option-btn">
                    <h2>SWEDISH DEFENSE</h2>
                    <p>Real-world military installations. Luleå, Gotland, & Stockholm hubs.</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
