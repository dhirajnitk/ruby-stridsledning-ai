<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boreal Chessmaster - Tactical Display</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden;}
        .top-nav { background: #11111b; border: 1px solid #313244; border-radius: 8px; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-shrink: 0;}
        .controls { display: flex; align-items: center; gap: 8px; }
        .doctrine-console { background: #181825; border: 1px solid #45475a; border-radius: 6px; padding: 3px 8px; display: flex; align-items: center; gap: 8px; }
        button { background: #45475a; color: #cdd6f4; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 11px;}
        button:hover { background: #585b70; transform: translateY(-1px); }
        button.danger { background: #f38ba8; color: #11111b; }
        button.ai-btn { background: #a6e3a1; color: #11111b; }
        .main-layout { display: flex; gap: 10px; flex: 1; min-height: 0; overflow: hidden; }
        .map-section { flex: 1; background: #181825; border: 1px solid #313244; border-radius: 10px; display: flex; flex-direction: column; min-width: 0; overflow: hidden; position: relative; }
        .data-stack { width: 300px; display: flex; flex-direction: column; gap: 10px; min-height: 0; flex-shrink: 0; }
        .panel { background: #181825; border: 1px solid #313244; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; min-height: 0; }
        .panel-header { font-size: 11px; font-weight: bold; margin-bottom: 8px; color: #89b4fa; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; letter-spacing: 1px;}
        #canvas-container { flex: 1; display: flex; justify-content: center; align-items: center; overflow: hidden; background: #11111b; border-radius: 6px; position: relative;}
        #radarCanvas { background: url('boreal-map.svg'); background-size: cover; border-radius: 6px; cursor: crosshair; }
        .trace-log { flex: 1; background: #11111b; border-radius: 6px; padding: 8px; font-family: 'Cascadia Code', monospace; font-size: 10px; overflow-y: auto; white-space: pre-wrap; color: #a6adc8; border: 1px solid #313244;}
        .status-light { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        .light-on { background: #a6e3a1; box-shadow: 0 0 5px #a6e3a1; }
        .light-off { background: #f38ba8; }
        .toggle-box { font-size: 9px; color: #a6adc8; display: flex; align-items: center; gap: 3px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div style="font-size: 16px; font-weight: bold; color: #fab387;">BOREAL CHESSMASTER <span style="font-size: 9px; color: #89b4fa; margin-left:5px;">v4.0</span></div>
        <div class="controls">
            <div class="doctrine-console">
                <select id="primary-doctrine" style="background:none; color:#cdd6f4; border:none; font-size:10px; outline:none;"><option value="balanced">BALANCED</option><option value="aggressive">AGGRESSIVE</option><option value="fortress">FORTRESS</option><option value="economy">ECONOMY</option><option value="ambush">AMBUSH</option><option value="saturation">SATURATION</option></select>
                <span style="color: #45475a;">|</span>
                <select id="secondary-doctrine" style="background:none; color:#cdd6f4; border:none; font-size:10px; outline:none;"><option value="none">NONE</option><option value="balanced">BALANCED</option><option value="aggressive">AGGRESSIVE</option><option value="fortress">FORTRESS</option></select>
            </div>
            <div style="display: flex; align-items: center; gap: 5px; font-size: 10px;">
                <input type="range" id="blend-ratio" min="0" max="100" value="70">
                <span id="blend-val">70% P</span>
            </div>
            <label class="toggle-box" title="Toggle RL Neural Logic"><input type="checkbox" id="use-rl" checked> NEURAL</label>
            <label class="toggle-box" title="Toggle Autonomous Mode"><input type="checkbox" id="auto-poll" checked> AUTO</label>
            <button id="btn-threat">Spawn</button>
            <button id="btn-blind" class="danger">Ambush</button>
            <button id="btn-ai" class="ai-btn">Execute AI</button>
        </div>
    </div>
    <div class="main-layout">
        <div class="map-section">
            <div class="panel-header" style="padding: 5px 10px;">TACTICAL THEATER <span>BOREAL PASSAGE</span></div>
            <div id="canvas-container"><canvas id="radarCanvas" width="1000" height="780"></canvas></div>
        </div>
        <div class="data-stack">
            <div class="panel" style="flex: 1;">
                <div class="panel-header">SITREP & DOCTRINE</div>
                <div id="active-posture-label" style="font-size: 13px; font-weight: bold; color: #a6e3a1;">INITIALIZING...</div>
                <div id="blend-ratio-pill" style="font-size: 9px; color: #89b4fa; margin-bottom: 5px;">SYNCING...</div>
                <div style="background: #1e1e2e; border-radius: 4px; padding: 6px; margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;"><span style="font-size: 10px; font-weight: bold; color: #fab387;">NEURAL CONFIDENCE</span></div>
                    <div style="display: flex; align-items: baseline; gap: 5px;"><div id="neural-value" style="font-size: 18px; font-weight: bold; color: #89b4fa;">SCANNING</div><div id="policy-status" style="font-size: 10px; color: #cba6f7;">STANDBY</div></div>
                </div>
                <div id="flag-lights" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3px; font-size: 8px; color: #9399b2;"></div>
            </div>
            <div class="panel" style="height: 150px;"><div class="panel-header">SURVIVAL TREND</div><div style="flex: 1; position: relative;"><canvas id="scoreChart"></canvas></div></div>
            <div class="panel" style="flex: 1.5;"><div class="panel-header">ENGINE TRACE</div><div id="ws-output" class="trace-log">Connecting...</div></div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('radarCanvas'); const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container'); const wsOutput = document.getElementById('ws-output');
        let activeThreats = []; let explosions = []; let latestAssignments = []; let scoreChart; const SCALE = 0.6; 
        const bases = [
            { name: "Northern Vanguard Base", x_km: 198.3, y_km: 335.0, color: "#3fc1ff", type: "base", inventory: { sam: 10 } },
            { name: "Highridge Command", x_km: 838.3, y_km: 75.0, color: "#3fc1ff", type: "base", inventory: { sam: 10 } },
            { name: "Arktholm (Capital X)", x_km: 418.3, y_km: 95.0, color: "#ffcc00", type: "capital", inventory: { sam: 20 } },
            { name: "Boreal Watch Post", x_km: 1158.3, y_km: 385.0, color: "#3fc1ff", type: "base", inventory: { sam: 10 } },
            { name: "Nordvik", x_km: 140, y_km: 323.3, color: "#ffffff", type: "city" },
            { name: "Valbrek", x_km: 1423.3, y_km: 213.3, color: "#ffffff", type: "city" }
        ];
        function fitCanvas() { const s = Math.min(container.clientWidth / 1000, container.clientHeight / 780, 1.0); canvas.style.transform = `scale(${s})`; canvas.style.transformOrigin = 'center center'; }
        window.addEventListener('resize', fitCanvas); fitCanvas();
        let ws;
        function connectWebSocket() {
            ws = new WebSocket("ws://127.0.0.1:8000/ws/logs");
            ws.onopen = () => wsOutput.innerHTML = `<span style="color: #a6e3a1;">[SYSTEM] Strategic Link Established. Monitoring Boreal Sector...</span>\n`;
            ws.onmessage = (e) => {
                const span = document.createElement("span");
                span.style.color = e.data.includes("KILL") ? "#f38ba8" : (e.data.includes("[STRAT]") ? "#fab387" : "#cdd6f4");
                span.textContent = e.data + "\n"; wsOutput.appendChild(span); wsOutput.scrollTop = wsOutput.scrollHeight;
            };
            ws.onclose = () => setTimeout(connectWebSocket, 2000);
        }
        connectWebSocket();
        async function requestAIOrders(isAuto = false) {
            const btn = document.getElementById('btn-ai');
            if (!isAuto) { btn.style.opacity = "0.5"; const logSpan = document.createElement("span"); logSpan.style.color = "#a6e3a1"; logSpan.textContent = `[COMMAND] Manual strategic override dispatched...\n`; wsOutput.appendChild(logSpan); wsOutput.scrollTop = wsOutput.scrollHeight; }
            try {
                const response = await fetch('http://127.0.0.1:8000/evaluate_advanced', {
                    method: 'POST', headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        state: { bases: bases.filter(b => b.type.includes("base") || b.type.includes("capital")).map(b => ({name: b.name, x: b.x_km, y: b.y_km, inventory: b.inventory})) },
                        threats: activeThreats.map(t => ({ id: t.id, x: t.x_km, y: t.y_km, speed_kmh: t.speed_kmh, heading: "Capital X", estimated_type: t.estimated_type, threat_value: t.threat_value })),
                        doctrine_primary: document.getElementById('primary-doctrine').value,
                        doctrine_secondary: document.getElementById('secondary-doctrine').value,
                        doctrine_blend: document.getElementById('blend-ratio').value / 100,
                        use_rl: document.getElementById('use-rl').checked
                    })
                });
                const data = await response.json(); latestAssignments = data.tactical_assignments || [];
                if (data.active_doctrine) {
                    const ad = data.active_doctrine; document.getElementById('active-posture-label').textContent = `${ad.primary.toUpperCase()}`;
                    document.getElementById('blend-ratio-pill').textContent = `BLEND: ${ad.blend_ratio}`;
                    const lights = document.getElementById('flag-lights'); lights.innerHTML = '';
                    Object.entries(ad.flags).forEach(([k, v]) => {
                        const item = document.createElement('div'); item.innerHTML = `<span class="status-light ${v ? 'light-on' : 'light-off'}"></span> ${k.replace('enable_', '').toUpperCase()}`; lights.appendChild(item);
                    });
                    if (data.rl_prediction !== undefined && activeThreats.length > 0 && document.getElementById('use-rl').checked) {
                        const rlNorm = Math.min(100, Math.max(0, (data.rl_prediction / 800) * 100));
                        document.getElementById('neural-value').textContent = rlNorm.toFixed(1) + "%";
                        document.getElementById('neural-value').style.color = rlNorm > 80 ? "#a6e3a1" : "#89b4fa";
                    } else { document.getElementById('neural-value').textContent = "HEURISTIC"; }
                }
                if(data.strategic_consequence_score !== undefined) {
                    scoreChart.data.labels.push(""); scoreChart.data.datasets[0].data.push(data.strategic_consequence_score);
                    if(scoreChart.data.labels.length > 20) { scoreChart.data.labels.shift(); scoreChart.data.datasets[0].data.shift(); }
                    scoreChart.update('none');
                }
            } catch(e) {} finally { if (!isAuto) btn.style.opacity = "1.0"; }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bases.forEach(b => { 
                const pxX = b.x_km * SCALE; const pxY = b.y_km * SCALE; ctx.fillStyle = b.color; ctx.beginPath();
                if(b.type.includes("city") || b.type.includes("capital")) { ctx.rect(pxX-4, pxY-4, 8, 8); } else { ctx.arc(pxX, pxY, 5, 0, 7); }
                ctx.fill(); ctx.fillStyle="#cdd6f4"; ctx.font = "8px Segoe UI"; ctx.fillText(b.name, pxX-15, pxY-8); 
            });
            activeThreats.forEach(t => { 
                t.x_km -= 4.0; t.y_km += 0.5; const pxX = t.x_km * SCALE; const pxY = t.y_km * SCALE;
                ctx.fillStyle = "#f38ba8"; ctx.beginPath(); ctx.arc(pxX, pxY, 3, 0, 7); ctx.fill(); 
                ctx.font = "8px monospace"; ctx.fillText(t.id, pxX+5, pxY+3);
            });
            if (Array.isArray(latestAssignments)) {
                latestAssignments.forEach(ass => {
                    const b = bases.find(base => base.name === ass.base_name); const t = activeThreats.find(th => th.id === ass.threat_id);
                    if (b && t) { ctx.strokeStyle = "#a6e3a1"; ctx.lineWidth = 1; ctx.setLineDash([3, 3]); ctx.beginPath(); ctx.moveTo(b.x_km * SCALE, b.y_km * SCALE); ctx.lineTo(t.x_km * SCALE, t.y_km * SCALE); ctx.stroke(); ctx.setLineDash([]); }
                });
            }
            explosions.forEach((exp, i) => { ctx.fillStyle = `rgba(250, 179, 135, ${exp.life/30})`; ctx.beginPath(); ctx.arc(exp.x_km * SCALE, exp.y_km * SCALE, (30-exp.life)*2, 0, 7); ctx.fill(); exp.life--; if(exp.life <= 0) explosions.splice(i, 1); });
            const targetedForKill = [];
            activeThreats.forEach(t => {
                if (latestAssignments.some(ass => ass.threat_id === t.id) && t.x_km < 1100 && Math.random() > 0.94) {
                    explosions.push({x_km: t.x_km, y_km: t.y_km, life: 30}); targetedForKill.push(t.id);
                }
            });
            activeThreats = activeThreats.filter(t => !targetedForKill.includes(t.id) && t.x_km > 0);
            requestAnimationFrame(draw);
        }
        document.getElementById('btn-threat').onclick = () => activeThreats.push({id: "T-"+Math.floor(Math.random()*900), x_km: 1600, y_km: 100+Math.random()*600, speed_kmh: 2000, estimated_type: "bomber", threat_value: 80});
        document.getElementById('btn-blind').onclick = () => { for(let i=0; i<10; i++) activeThreats.push({id: "G-S"+Math.floor(Math.random()*900), x_km: 1600+(i*40), y_km: 50+Math.random()*700, speed_kmh: 4500, estimated_type: "ghost", threat_value: 150}); };
        document.getElementById('btn-ai').onclick = () => requestAIOrders(false);
        document.getElementById('blend-ratio').oninput = (e) => document.getElementById('blend-val').textContent = e.target.value + "% P";
        const ctxChart = document.getElementById('scoreChart').getContext('2d');
        scoreChart = new Chart(ctxChart, { type: 'line', data: { labels: [], datasets: [{ label: 'S', data: [], borderColor: '#fab387', tension: 0.3, fill: false, pointRadius: 0 }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 1000, grid: { display: false } }, x: { display: false } }, plugins: { legend: { display: false } } } });
        setInterval(() => { if(document.getElementById('auto-poll').checked) requestAIOrders(true); }, 200);
        draw();
    </script>
</body>
</html>
