  <!-- MUS: Muskö Naval Base — x=4, y=-46 → SVG(540, 650) -->
  <rect x="532" y="643" width="14" height="14" rx="2"
    fill="#003366" stroke="#3399ff" stroke-width="1.5"
    data-id="MUS" data-name="Muskö Naval Base" data-subtype="naval_base" data-side="north"/>
  <text x="548" y="654" fill="#66aaff" font-size="9" font-family="monospace" font-weight="bold">MUS</text>
  <text x="548" y="664" fill="rgba(100,160,255,0.6)" font-size="7" font-family="monospace">MUSKÖ</text>

  <!-- KRL: Karlskrona Naval — x=-153, y=-352 → SVG(465, 797) -->
  <rect x="457" y="790" width="14" height="14" rx="2"
