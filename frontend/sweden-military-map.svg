  <!-- Gotland Island (Baltic Sea island, Sweden's largest) -->
  <ellipse cx="615" cy="695" rx="22" ry="38"
    fill="#22332a" stroke="#2e3e2e" stroke-width="1"
    data-name="Gotland Island" data-info="Gotland — strategic Baltic island"/>
  <!-- Öland Island (smaller, near Gotland) -->
  <ellipse cx="540" cy="740" rx="7" ry="22"
    fill="#22332a" stroke="#2e3e2e" stroke-width="0.8"/>

  <!-- ===================== MILITARY INSTALLATIONS =====================
       Coordinate basis: Swedish_Military_Installations.csv x_km/y_km
       Plotting formula: SVG_x = 538 + x_km * 0.48
                         SVG_y = 628 - y_km * 0.48     (north-positive → negate for SVG)
       11 locations total.
  -->

  <!-- ── NORTH AIR BASES (red circles) ── -->
  <!-- F21: Luleå Air Base — x=185, y=691 → SVG(627, 296) -->
  <circle cx="627" cy="296" r="8" fill="#cc3333" stroke="#000" stroke-width="1.2"
    data-id="F21" data-name="Luleå Air Base (F 21)" data-subtype="air_base" data-side="north"/>
  <text x="638" y="300" fill="#ff6666" font-size="9" font-family="monospace" font-weight="bold">F21</text>
  <text x="638" y="310" fill="rgba(255,150,150,0.6)" font-size="7" font-family="monospace">LULEÅ</text>

  <!-- VID: Vidsel Air Base — x=95, y=728 → SVG(584, 278) -->
  <circle cx="584" cy="278" r="8" fill="#cc3333" stroke="#000" stroke-width="1.2"
    data-id="VID" data-name="Vidsel Air Base" data-subtype="air_base" data-side="north"/>
  <text x="595" y="282" fill="#ff6666" font-size="9" font-family="monospace" font-weight="bold">VID</text>
  <text x="595" y="292" fill="rgba(255,150,150,0.6)" font-size="7" font-family="monospace">VIDSEL</text>

  <!-- F16: Uppsala Air Base — x=-27, y=63 → SVG(525, 598) -->
  <circle cx="525" cy="598" r="8" fill="#cc3333" stroke="#000" stroke-width="1.2"
    data-id="F16" data-name="Uppsala Air Base (F 16)" data-subtype="air_base" data-side="north"/>
  <text x="536" y="602" fill="#ff6666" font-size="9" font-family="monospace" font-weight="bold">F16</text>
  <text x="536" y="612" fill="rgba(255,150,150,0.6)" font-size="7" font-family="monospace">UPPSALA</text>

  <!-- ── SOUTH AIR BASES (red circles) ── -->
  <!-- F7: Såtenäs — x=-313, y=-99 → SVG(388, 676) -->
  <circle cx="388" cy="676" r="8" fill="#cc3333" stroke="#000" stroke-width="1.2"
    data-id="F7" data-name="Såtenäs Air Base (F 7)" data-subtype="air_base" data-side="south"/>
  <text x="399" y="680" fill="#ff6666" font-size="9" font-family="monospace" font-weight="bold">F7</text>
  <text x="399" y="690" fill="rgba(255,150,150,0.6)" font-size="7" font-family="monospace">SÅTENÄS</text>

  <!-- MAL: Malmen Air Base — x=-150, y=-104 → SVG(466, 678) -->
  <circle cx="466" cy="678" r="8" fill="#cc3333" stroke="#000" stroke-width="1.2"
    data-id="MAL" data-name="Malmen Air Base" data-subtype="air_base" data-side="south"/>
  <text x="477" y="682" fill="#ff6666" font-size="9" font-family="monospace" font-weight="bold">MAL</text>
  <text x="477" y="692" fill="rgba(255,150,150,0.6)" font-size="7" font-family="monospace">MALMEN</text>

  <!-- F17: Ronneby Air Base — x=-172, y=-340 → SVG(455, 791) -->
  <circle cx="455" cy="791" r="8" fill="#cc3333" stroke="#000" stroke-width="1.2"
    data-id="F17" data-name="Ronneby Air Base (F 17)" data-subtype="air_base" data-side="south"/>
  <text x="466" y="795" fill="#ff6666" font-size="9" font-family="monospace" font-weight="bold">F17</text>
  <text x="466" y="805" fill="rgba(255,150,150,0.6)" font-size="7" font-family="monospace">RONNEBY</text>

  <!-- ── CAPITAL (gold star) ── -->
  <!-- STO: Stockholm — x=0, y=0 → SVG(538, 628) -->
  <polygon points="538,616 542,626 552,626 544,633 547,643 538,637 529,643 532,633 524,626 534,626"
    fill="#ffcc00" stroke="#000" stroke-width="1.2"
    data-id="STO" data-name="Stockholm (Capital)" data-subtype="capital" data-side="north"
    filter="url(#glow-green)"/>
  <text x="549" y="632" fill="#ffee66" font-size="9" font-family="monospace" font-weight="bold">STO</text>
  <text x="549" y="643" fill="rgba(255,220,100,0.7)" font-size="7" font-family="monospace">STOCKHOLM ★</text>

