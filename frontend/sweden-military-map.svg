  <!-- Finland border hint (east) -->
  <path d="M 803,155 C 850,180 880,220 910,260 C 940,300 955,350 950,400"
    fill="none" stroke="rgba(100,120,100,0.2)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Scale bar -->
  <line x1="780" y1="852" x2="940" y2="852" stroke="white" stroke-width="2"/>
  <line x1="780" y1="847" x2="780" y2="857" stroke="white" stroke-width="2"/>
  <line x1="940" y1="847" x2="940" y2="857" stroke="white" stroke-width="2"/>
  <text x="860" y="870" fill="rgba(255,255,255,0.4)" font-size="10" text-anchor="middle" font-family="monospace">200 km</text>

  <!-- Legend -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="160" height="115" rx="4" fill="rgba(5,12,20,0.75)" stroke="rgba(0,242,255,0.2)" stroke-width="1"/>
    <text x="8" y="16" fill="rgba(0,242,255,0.7)" font-size="8" font-family="monospace" font-weight="bold" letter-spacing="1">ASSET CLASSIFICATION</text>
    <rect x="8" y="22" width="120" height="1" fill="rgba(0,242,255,0.15)"/>
    <!-- Air Base -->
    <circle cx="16" cy="36" r="5" fill="#cc3333" stroke="#000" stroke-width="1"/>
    <text x="26" y="40" fill="rgba(255,150,150,0.8)" font-size="8" font-family="monospace">Air Base</text>
    <!-- Capital -->
    <polygon points="16,52 19,58 25,58 20,62 22,68 16,64 10,68 12,62 7,58 13,58" fill="#ffcc00" stroke="#000" stroke-width="0.8"/>
    <text x="26" y="63" fill="rgba(255,220,100,0.8)" font-size="8" font-family="monospace">Capital</text>
    <!-- Naval -->
    <rect x="10" y="72" width="12" height="12" rx="1" fill="#003366" stroke="#3399ff" stroke-width="1.5"/>
    <text x="26" y="82" fill="rgba(100,160,255,0.8)" font-size="8" font-family="monospace">Naval Base</text>
    <!-- Strategic City -->
    <polygon points="16,96 22,104 16,112 10,104" fill="#006666" stroke="#00cccc" stroke-width="1.2"/>
    <text x="26" y="107" fill="rgba(0,200,200,0.8)" font-size="8" font-family="monospace">Strategic City</text>
  </g>

  <!-- Theater Title -->
  <text x="500" y="888" fill="rgba(180,220,180,0.25)" font-size="11" font-weight="bold"
    text-anchor="middle" letter-spacing="4" font-family="monospace">SWEDEN — MILITARY INSTALLATIONS AOR</text>

  <!-- Coordinate reference -->
  <text x="6" y="14" fill="rgba(255,255,255,0.1)" font-size="8" font-family="monospace">lon 10°E</text>
  <text x="6" y="886" fill="rgba(255,255,255,0.1)" font-size="8" font-family="monospace">lat 55°N</text>
  <text x="930" y="14" fill="rgba(255,255,255,0.1)" font-size="8" font-family="monospace">25°E</text>
  <text x="930" y="886" fill="rgba(255,255,255,0.1)" font-size="8" font-family="monospace">70°N</text>
</svg>
