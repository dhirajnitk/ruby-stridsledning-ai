  <text x="626" y="721" fill="#00dddd" font-size="9" font-family="monospace" font-weight="bold">GOT</text>
  <text x="626" y="731" fill="rgba(0,200,200,0.6)" font-size="7" font-family="monospace">GOTLAND</text>

