<svg id="map" width="100%" viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-sw" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    </pattern>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: Baltic Sea / surrounding waters -->
  <rect width="1000" height="900" fill="#0a1826"/>
  <rect width="1000" height="900" fill="url(#grid-sw)"/>

  <!-- ===================== SWEDEN MAINLAND =====================
       Coordinates: SVG_x = (lon - 10.0) * 66.67
                    SVG_y = (70.5 - lat) * 56.25
       Origin anchor: Stockholm lon=18.07°E, lat=59.33°N → SVG (538, 628)
  -->
