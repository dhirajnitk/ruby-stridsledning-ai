<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOREAL KINETIC 3D — INTERCEPT SIMULATOR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010a12;font-family:'Courier New',monospace;color:#00f2ff;overflow:hidden;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(0,0,0,0.7);border-bottom:1px solid rgba(0,242,255,0.3)}
#hud h1{font-size:.7rem;letter-spacing:3px}
.controls{display:flex;gap:8px;align-items:center}
select,button{background:rgba(0,242,255,0.08);border:1px solid rgba(0,242,255,0.4);color:#00f2ff;font-family:'Courier New',monospace;font-size:.6rem;padding:6px 12px;cursor:pointer;border-radius:3px;letter-spacing:1px}
button:hover{background:rgba(0,242,255,0.2);box-shadow:0 0 10px rgba(0,242,255,0.3)}
button.red{border-color:rgba(255,62,62,0.6);color:#ff3e3e}
button.red:hover{background:rgba(255,62,62,0.15)}
button.green{border-color:rgba(0,255,136,0.6);color:#00ff88}
button.green:hover{background:rgba(0,255,136,0.1)}
#canvas-wrap{position:fixed;top:0;left:0;width:100%;height:100%}
#log{position:fixed;bottom:0;left:0;right:0;height:110px;background:rgba(0,0,0,0.8);border-top:1px solid rgba(0,242,255,0.2);padding:8px 16px;overflow-y:auto;z-index:10}
#log p{font-size:.52rem;line-height:1.6;letter-spacing:.5px}
.s{color:#00ff88}.a{color:#ff3e3e}.i{color:rgba(0,242,255,.55)}.w{color:#ffcc00}
#stats-hud{position:fixed;top:50px;right:16px;z-index:10;background:rgba(0,0,0,.7);border:1px solid rgba(0,242,255,.2);padding:12px;border-radius:4px;min-width:160px}
#stats-hud .sh{font-size:.45rem;color:#888;letter-spacing:1px;margin-bottom:4px}
#stats-hud .sv{font-size:1.1rem;font-weight:bold;margin-bottom:8px}
#label-overlay{position:fixed;top:50px;left:16px;z-index:10;pointer-events:none}
.lbl{position:absolute;font-size:.48rem;letter-spacing:1px;white-space:nowrap;text-shadow:0 0 6px currentColor;transform:translate(-50%,-50%)}
.klbl{position:absolute;font-size:.5rem;letter-spacing:2px;white-space:nowrap;font-weight:bold;transform:translate(-50%,-200%);padding:2px 6px;border-radius:2px;pointer-events:none}
.klbl.tracking{color:#ffcc00;border:1px solid rgba(255,204,0,.4);background:rgba(255,204,0,.08)}
.klbl.locked{color:#00ff88;border:1px solid rgba(0,255,136,.5);background:rgba(0,255,136,.1);animation:blink .5s infinite}
.klbl.lostlock{color:#ff3e3e;border:1px solid rgba(255,62,62,.5);background:rgba(255,62,62,.1)}
.klbl.killed{color:#00f2ff;border:1px solid #00f2ff;background:rgba(0,242,255,.15)}
.klbl.impact{color:#ff3e3e;border:1px solid #ff3e3e;background:rgba(255,62,62,.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#freeze-overlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(2px)}
#freeze-overlay.active{display:flex}
#freeze-banner{font-size:1.4rem;letter-spacing:6px;color:#ffcc00;text-shadow:0 0 20px rgba(255,204,0,.8);animation:blink .8s infinite;margin-bottom:12px}
#freeze-sub{font-size:.55rem;color:rgba(255,204,0,.7);letter-spacing:3px}
#freeze-btns{display:flex;gap:10px;margin-top:18px}
#freeze-btns button{padding:10px 24px;font-size:.65rem;letter-spacing:2px;cursor:pointer;border-radius:4px;font-family:'Courier New',monospace}
#btn-approve-k{background:rgba(0,255,136,.15);border:1px solid #00ff88;color:#00ff88}
#btn-reject-k{background:rgba(255,62,62,.12);border:1px solid #ff3e3e;color:#ff3e3e}
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="hud">
  <h1>⚡ BOREAL KINETIC 3D — INTERCEPT SIMULATOR</h1>
  <div class="controls">
    <select id="sel-theater">
      <option value="sweden">🇸🇪 SWEDEN THEATER</option>
      <option value="boreal">🛡 BOREAL THEATER</option>
    </select>
    <select id="sel-weapon">
      <option value="CRUISE">CRUISE MISSILE</option>
      <option value="HYPERSONIC">HYPERSONIC GLIDE</option>
      <option value="LOITER">LOITERING MUNITION</option>
      <option value="BALLISTIC">BALLISTIC MISSILE</option>
    </select>
    <select id="sel-outcome">
      <option value="intercept">INTERCEPT (HIT)</option>
      <option value="miss">MISS (IMPACT)</option>
    </select>
    <select id="sel-mode"><option value="auto">🤖 AUTO</option><option value="hitl">👤 HITL</option><option value="manual">🎯 MANUAL</option></select>
    <select id="sel-wave-rate" title="Wave defense success rate">
      <option value="1.0">WAVE: 100% DEF</option>
      <option value="0.8">WAVE: 80% DEF</option>
      <option value="0.6">WAVE: 60% DEF</option>
      <option value="0.4">WAVE: DEGRADED</option>
    </select>
    <button class="green" id="btn-fire">▶ FIRE DEMO</button>
    <button class="red" id="btn-wave">⚡ SATURATION WAVE</button>
    <button id="btn-reset">↺ RESET</button>
    <button onclick="window.history.back()">◄ BACK</button>
  </div>
  <div id="stats-hud">
    <div class="sh">THREATS</div><div class="sv" id="s-threats" style="color:#ffcc00">0</div>
    <div class="sh">SAMs</div><div class="sv" id="s-fired" style="color:#00f2ff">0</div>
    <div class="sh">KILLS</div><div class="sv" id="s-kills" style="color:#00ff88">0</div>
    <div class="sh">IMPACTS</div><div class="sv" id="s-impacts" style="color:#ff3e3e">0</div>
  </div>
</div>

<!-- FREEZE OVERLAY -->
<div id="freeze-overlay">
  <div id="freeze-banner">⏸ TACTICAL FREEZE</div>
  <div id="freeze-sub">AWAITING COMMANDER DECISION</div>
  <div id="freeze-threat-info" style="font-size:.55rem;color:#ff3e3e;letter-spacing:2px;margin:6px 0;min-height:1.2em"></div>
  <div id="manual-base-select" style="display:none;margin:8px 0">
    <div style="font-size:.45rem;color:#888;letter-spacing:1px;margin-bottom:4px">OVERRIDE LAUNCHER BASE</div>
    <select id="manual-base-override" style="background:rgba(255,204,0,.1);border:1px solid rgba(255,204,0,.5);color:#ffcc00;font-family:'Courier New',monospace;font-size:.6rem;padding:5px 10px;min-width:200px"></select>
  </div>
  <div id="freeze-btns">
    <button id="btn-approve-k">✔ APPROVE INTERCEPT</button>
    <button id="btn-reject-k">✖ REJECT — HOLD FIRE</button>
  </div>
</div>

<div id="label-overlay"></div>
<div id="log"><div id="log-feed"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── THEATER DATA ──────────────────────────────────────────────
// Universal coordinate-to-scene scale: SVG scale bar = 120 units / 200 km → 1 unit = 1.666 km = 1666 m
const SC = 1666;
const THEATERS = {
  sweden:[
    {id:'F21', name:'Luleå Air Base (F 21)', x:185, y:691},
    {id:'F16', name:'Uppsala Air Base (F 16)', x:-27, y:63},
    {id:'VID', name:'Vidsel Air Base', x:95, y:728},
    {id:'STO', name:'Stockholm (Capital)', x:0, y:0, hva:true},
    {id:'MUS', name:'Muskö Naval Base', x:4, y:-46},
    {id:'F7',  name:'Såtenäs Air Base (F 7)', x:-313, y:-99},
    {id:'F17', name:'Ronneby Air Base (F 17)', x:-172, y:-340},
    {id:'MAL', name:'Malmen Air Base', x:-150, y:-104},
    {id:'KRL', name:'Karlskrona Naval Base', x:-153, y:-352},
    {id:'GOT', name:'Gotland (Visby Base)', x:16, y:-186},
    {id:'GBG', name:'Gothenburg Port', x:-364, y:-180, hva:true},
  ],
  boreal:[
    // NORTH (SVG north-group: translate(0,-40) applied to raw SVG coords)
    {id:'NVB', name:'NORTHERN VANGUARD',   x:119,  y:197},
    {id:'HRC', name:'HIGHRIDGE COMMAND',   x:503,  y:41},
    {id:'BWP', name:'BOREAL WATCH POST',   x:695,  y:227},
    {id:'ARK', name:'ARKTHOLM CAPITAL',    x:251,  y:57,   hva:true},
    {id:'VAL', name:'VALBREK',             x:854,  y:128,  hva:true},
    {id:'NRD', name:'NORDVIK',             x:84,   y:194,  hva:true},
    // SOUTH (SVG south-group: translate(0,+40) applied to raw SVG coords)
    {id:'FWS', name:'FIREWATCH STATION',   x:839,  y:639},
    {id:'SRB', name:'SOUTHERN REDOUBT',    x:193,  y:739},
    {id:'SPB', name:'SPEAR POINT BASE',    x:551,  y:497},
    {id:'MER', name:'MERIDIA CAPITAL',     x:735,  y:725,  hva:true},
    {id:'CAL', name:'CALLHAVEN',           x:58,   y:690,  hva:true},
    {id:'SOL', name:'SOLANO',              x:346,  y:742,  hva:true},
  ]
};
const WEAPONS={
  CRUISE:    {speed:1.2,color:0xff3e3e,trail:'#ff3e3e',label:'CRUISE',alt:60000},
  HYPERSONIC:{speed:4.0,color:0xffcc00,trail:'#ffcc00',label:'HYPERSONIC',alt:120000},
  LOITER:    {speed:0.6,color:0xff00ff,trail:'#ff00ff',label:'LOITER',alt:30000},
  BALLISTIC: {speed:2.5,color:0xff5500,trail:'#ff5500',label:'BALLISTIC',alt:180000},
};

// ── SCENE SETUP ───────────────────────────────────────────────
const wrap=document.getElementById('canvas-wrap');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x010a12);
scene.fog=new THREE.Fog(0x010a12,2000000,8000000);

const W=window.innerWidth, H=window.innerHeight;
const camera=new THREE.PerspectiveCamera(55,W/H,1000,12000000);
camera.position.set(0,600000,1200000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(devicePixelRatio);
wrap.appendChild(renderer.domElement);

const orbit=new THREE.OrbitControls(camera,renderer.domElement);
orbit.enableDamping=true;orbit.dampingFactor=0.06;
orbit.minDistance=50000;orbit.maxDistance=5000000;

// Lighting
scene.add(new THREE.AmbientLight(0x0a1a2a,2));
const dlight=new THREE.DirectionalLight(0x00f2ff,0.4);
dlight.position.set(500000,800000,300000);
scene.add(dlight);

// Stars
(()=>{
  const sg=new THREE.BufferGeometry();
  const sv=[];for(let i=0;i<3000;i++){
    sv.push((Math.random()-0.5)*10000000,(Math.random()-0.5)*10000000,(Math.random()-0.5)*10000000);
  }
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:800,transparent:true,opacity:0.6})));
})();

// ── GRID / GROUND ─────────────────────────────────────────────
const gridH=new THREE.GridHelper(2000000,40,0x003344,0x001122);
gridH.position.y=0;
scene.add(gridH);

// ── BASE MARKERS ──────────────────────────────────────────────
// Theater center coordinates (SVG units) for camera positioning
const THEATER_CENTERS = {
  sweden: { x: 0,   z: 0,   camX: 0,      camY: 600000, camZ: 1200000, tgtX: 0,      tgtZ: 0      },
  boreal: { x: 456, z: 391, camX: 759000, camY: 700000, camZ: 1852000, tgtX: 759000, tgtZ: 652000 }
};

let baseMarkers=[];
function buildBases(theater){
  baseMarkers.forEach(m=>{ scene.remove(m); m.geometry.dispose(); m.material.dispose(); }); baseMarkers=[];
  sceneLabels.forEach(l=>l.div.remove()); sceneLabels.length=0;
  labelOverlay.innerHTML = ''; // Full purge
  THEATERS[theater].forEach(b=>{
    const geo=new THREE.CylinderGeometry(0,12000,28000,6);
    const col=b.hva?0x00ff88:0x00f2ff;
    const mesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:col,wireframe:true}));
    mesh.position.set(b.x*SC,0,b.y*SC);
    scene.add(mesh); baseMarkers.push(mesh);

    // Glow ring
    const ring=new THREE.Mesh(
      new THREE.TorusGeometry(20000,1200,8,32),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.4})
    );
    ring.rotation.x=Math.PI/2;
    ring.position.set(b.x*SC,100,b.y*SC);
    scene.add(ring); baseMarkers.push(ring);

    // Label
    addLabel(b.name,b.x*SC,b.y*SC,col);
  });

  // Reposition camera & orbit to theater center
  const tc = THEATER_CENTERS[theater] || THEATER_CENTERS.sweden;
  camera.position.set(tc.camX, tc.camY, tc.camZ);
  orbit.target.set(tc.tgtX, 0, tc.tgtZ);
  orbit.update();
}

// ── DOM LABELS ────────────────────────────────────────────────
const labelOverlay=document.getElementById('label-overlay');
const sceneLabels=[];
function addLabel(text,wx,wz,col){
  const div=document.createElement('div');
  div.className='lbl';
  div.textContent=text;
  div.style.color=`#${col.toString(16).padStart(6,'0')}`;
  labelOverlay.appendChild(div);
  sceneLabels.push({div,wx,wz});
}
function updateLabels(){
  sceneLabels.forEach(({div,wx,wz})=>{
    const v=new THREE.Vector3(wx,0,wz);
    v.project(camera);
    const px=(v.x*.5+.5)*window.innerWidth;
    const py=(-.5*v.y+.5)*window.innerHeight-20;
    div.style.left=px+'px';div.style.top=py+'px';
    div.style.display=v.z<1?'block':'none';
  });
}

// ── LOGGING ───────────────────────────────────────────────────
const logFeed=document.getElementById('log-feed');
function log(msg,cls='i'){
  const p=document.createElement('p');
  p.className=cls;p.textContent='> '+msg;
  logFeed.prepend(p);
  while(logFeed.children.length>40)logFeed.removeChild(logFeed.lastChild);
}

// ── STATS ─────────────────────────────────────────────────────
let sFired=0,sKills=0,sImpacts=0,sThreats=0;
let waveActive=0; // tracks how many wave missiles are still in flight
function updateStats(){
  document.getElementById('s-threats').textContent=sThreats;
  document.getElementById('s-fired').textContent=sFired;
  document.getElementById('s-kills').textContent=sKills;
  document.getElementById('s-impacts').textContent=sImpacts;
}

// ── PARTICLE EXPLOSION ────────────────────────────────────────
const particles=[];
function explode(pos,col,count=80){
  const geo=new THREE.BufferGeometry();
  const verts=[];const vels=[];
  for(let i=0;i<count;i++){
    verts.push(pos.x,pos.y,pos.z);
    vels.push((Math.random()-.5)*60000,(Math.random()-.5)*60000,(Math.random()-.5)*60000);
  }
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:col,size:5000,transparent:true,opacity:1}));
  scene.add(pts);
  particles.push({pts,vels,life:1.0});
}

function tickParticles(){
  for(let i=particles.length-1; i>=0; i--){
    const p=particles[i];
    p.life-=0.025;
    if(p.life<=0){
      scene.remove(p.pts);
      p.pts.geometry.dispose();
      p.pts.material.dispose();
      particles.splice(i,1);
      continue;
    }
    const pos=p.pts.geometry.attributes.position.array;
    for(let j=0; j<pos.length; j+=3){
      pos[j]+=p.vels[j/3*3]; pos[j+1]+=p.vels[j/3*3+1]; pos[j+2]+=p.vels[j/3*3+2];
    }
    p.pts.geometry.attributes.position.needsUpdate=true;
    p.pts.material.opacity=p.life;
  }
}

// ── TRAIL SYSTEM ──────────────────────────────────────────────
function makeTrail(color,length=40){
  const positions=new Float32Array(length*3);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity:0.7,linewidth:2});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  return{line,positions,ptr:0,length};
}
function pushTrail(trail,x,y,z){
  const p=trail.positions;
  for(let i=p.length-3;i>=3;i-=3){p[i]=p[i-3];p[i+1]=p[i-2];p[i+2]=p[i-1];}
  p[0]=x;p[1]=y;p[2]=z;
  trail.line.geometry.attributes.position.needsUpdate=true;
}

// ── FREEZE & MODE STATE ──────────────────────────────────────
let SIM_PAUSED = false;
let CMD_MODE = 'auto';
let pendingKinetic = null;

const freezeOverlay = document.getElementById('freeze-overlay');

function freezeSim(k) {
  if (SIM_PAUSED) return;
  SIM_PAUSED = true;
  pendingKinetic = k;
  freezeOverlay.classList.add('active');
  // BUG-K06 FIX: Show threat type + target in freeze overlay
  const infoEl = document.getElementById('freeze-threat-info');
  if (infoEl) infoEl.textContent = k._threatInfo || '';
  const baseSelDiv = document.getElementById('manual-base-select');
  const baseSelEl  = document.getElementById('manual-base-override');
  if (CMD_MODE === 'manual' && baseSelDiv && baseSelEl) {
    // BUG-K04 FIX: MANUAL mode — show base selector, distinct banner
    document.getElementById('freeze-banner').textContent = '🎯 MANUAL ENGAGEMENT';
    document.getElementById('freeze-sub').textContent    = 'SELECT LAUNCHER — OVERRIDE ACTIVE';
    baseSelDiv.style.display = 'block';
    baseSelEl.innerHTML = '';
    const theater = document.getElementById('sel-theater').value;
    THEATERS[theater].filter(b=>!b.hva).forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.id;
      opt.textContent = b.name;
      if (k._defBaseIds && b.id === k._defBaseIds[0]) opt.selected = true;
      baseSelEl.appendChild(opt);
    });
  } else {
    document.getElementById('freeze-banner').textContent = '⏸ TACTICAL FREEZE';
    document.getElementById('freeze-sub').textContent    = 'AWAITING COMMANDER DECISION';
    if (baseSelDiv) baseSelDiv.style.display = 'none';
  }
  log('TACTICAL FREEZE — AWAITING COMMANDER', 'w');
}
function resumeSim() {
  SIM_PAUSED = false;
  pendingKinetic = null;
  freezeOverlay.classList.remove('active');
  log('SIMULATION RESUMED', 'i');
}

document.getElementById('btn-approve-k').addEventListener('click', () => {
  if (pendingKinetic) {
    pendingKinetic._approved = true;
    // BUG-K04 FIX: MANUAL mode — override defBases[0] with operator-selected base
    if (CMD_MODE === 'manual') {
      const selId = document.getElementById('manual-base-override').value;
      const theater = document.getElementById('sel-theater').value;
      const overrideBase = THEATERS[theater].find(b => b.id === selId);
      if (overrideBase) pendingKinetic._manualBase = overrideBase;
    }
  }
  resumeSim();
});
document.getElementById('btn-reject-k').addEventListener('click', () => {
  if (pendingKinetic) { pendingKinetic._rejected = true; }
  resumeSim();
  log('INTERCEPT REJECTED — THREAT CONTINUES', 'a');
});
document.getElementById('sel-mode').addEventListener('change', e => {
  CMD_MODE = e.target.value;
  log(`MODE: ${CMD_MODE.toUpperCase()}`, 'i');
});

// Radar physics constants (from mega_data_factory.py)
const PT=100e3, G=Math.pow(10,3), WL=0.03, P_MIN=1e-14;
function radarReturn(range, rcs) {
  if(range<=0) return 0;
  return (PT*G*G*WL*WL*rcs)/(Math.pow(4*Math.PI,3)*Math.pow(range,4));
}

// Floating missile status labels
const kineticLabels = [];
function addKineticLabel(id) {
  const div = document.createElement('div');
  div.className = 'klbl tracking';
  div.id = 'klbl-'+id;
  div.textContent = '◉ TRACKING';
  document.getElementById('label-overlay').appendChild(div);
  return div;
}
function updateKineticLabel(div, state, wx, wz) {
  if (!div) return;
  const v = new THREE.Vector3(wx, 0, wz);
  v.project(camera);
  div.style.left = (v.x*.5+.5)*window.innerWidth+'px';
  div.style.top = (-.5*v.y+.5)*window.innerHeight+'px';
  div.style.display = v.z<1?'block':'none';
  div.className = 'klbl '+state;
  const labels = {tracking:'◉ TRACKING',locked:'🔒 LOCKED',lostlock:'⚠ LOST LOCK',killed:'💥 KILLED',impact:'☠ IMPACT'};
  div.textContent = labels[state] || state;
}

// ── ACTIVE KINETICS ───────────────────────────────────────────
const kinetics=[];
let kId=0;

function launchKinetic(theater,weaponKey,outcome,isWave=false){
  const bases=THEATERS[theater];
  const tgt=bases[Math.floor(Math.random()*bases.length)];
  const wdef=WEAPONS[weaponKey];

  // Spawn from random edge
  const angle=Math.random()*Math.PI*2;
  const dist=800000+Math.random()*400000;
  const spawnX=tgt.x*SC+Math.cos(angle)*dist;
  const spawnZ=tgt.y*SC+Math.sin(angle)*dist;
  const spawnY=wdef.alt*(0.5+Math.random()*0.5);

  const tgtX=tgt.x*SC, tgtZ=tgt.y*SC;

  // Missile mesh
  const mGeo=new THREE.ConeGeometry(5000,20000,8);
  const mMesh=new THREE.Mesh(mGeo,new THREE.MeshBasicMaterial({color:wdef.color,wireframe:false}));
  scene.add(mMesh);
  const trail=makeTrail(wdef.color);

  const totalFrames=220;
  let frame=0;

  // ── SALVO SETUP: 2 closest non-HVA bases ranked by distance to target ────
  const nonHva=bases.filter(b=>!b.hva);
  const sortedBases=[...nonHva].sort((a,b)=>
    Math.hypot((a.x-tgt.x)*SC,(a.y-tgt.y)*SC)-Math.hypot((b.x-tgt.x)*SC,(b.y-tgt.y)*SC));
  const defBases=[];
  if(outcome==='intercept'){
    sortedBases.slice(0,2).forEach(b=>defBases.push(b));
  }
  // BUG-K01 FIX: increment threat counter on every launch (not just on SAM fire)
  sThreats++; updateStats();

  // ── PREDICTED INTERCEPT POINT GUIDANCE ───────────────────────────────────
  // For scripted (parametric) trajectories, solving for the earliest future
  // missile position reachable at constant interceptor speed is exact and far
  // superior to PN, which requires accurate real-time velocity estimation.
  function aimPoint(iPos, iSpeed, curFrame){
    for(let k=1; k<=220; k++){
      const tf=Math.min((curFrame+k)/totalFrames,1.0);
      const pfX=spawnX+(tgtX-spawnX)*tf;
      const pfZ=spawnZ+(tgtZ-spawnZ)*tf;
      const peakY=wdef.alt*(1-tf*tf*0.3);
      const pfY=peakY*(1-tf)+10000*tf;
      if(iPos.distanceTo(new THREE.Vector3(pfX,pfY,pfZ))<=iSpeed*k)
        return new THREE.Vector3(pfX,pfY,pfZ);
    }
    return new THREE.Vector3(tgtX,0,tgtZ); // fallback: aim at impact point
  }

  // ── INTERCEPTOR POOL (salvo-ready) ────────────────────────────────────────
  const INT_SPEED=18000; // m/frame — tuned for cruise geometry
  const sams=[];

  function spawnSAM(base,label){
    const dbx=base.x*SC, dbz=base.y*SC;
    const iGeo=new THREE.ConeGeometry(4000,16000,6);
    const iMesh=new THREE.Mesh(iGeo,new THREE.MeshBasicMaterial({color:0x00f2ff}));
    scene.add(iMesh);
    const iTrail=makeTrail(0x00f2ff);
    iMesh.position.set(dbx,5000,dbz);
    sams.push({mesh:iMesh, trail:iTrail, vel:new THREE.Vector3(1,0,0), active:true});
    log(`${label} LAUNCHED from ${base.name}`,'s');
    sFired++; updateStats();
  }

  function disposeSAM(sam){
    if(!sam.active) return;
    sam.active=false;
    scene.remove(sam.mesh); sam.mesh.geometry.dispose(); sam.mesh.material.dispose();
    setTimeout(()=>{
      scene.remove(sam.trail.line);
      sam.trail.line.geometry.dispose(); sam.trail.line.material.dispose();
    },3000);
  }

  const myId=kId++;
  const statusDiv=addKineticLabel(myId);
  log(`TRACKING ${wdef.label} → ${tgt.name}`,'w');
  // Store threat info for freeze overlay (BUG-K06 FIX)
  const kThreatInfo = `${weaponKey} → ${tgt.name}`;
  // Store base IDs for manual override selector (BUG-K04 FIX)
  const kDefBaseIds = defBases.map(b=>b.id);

  // ── Neural Engine Query (async, non-blocking) ────────────────────────────
  // Call CORTEX-1 (/evaluate_advanced) for a strategic SITREP and effector
  // recommendation. Does not block the simulation — fires and logs on response.
  (async()=>{
    try{
      const typeMap={CRUISE:'cruise-missile',HYPERSONIC:'hypersonic-pgm',LOITER:'drone',BALLISTIC:'ballistic'};
      const speedMap={CRUISE:800,HYPERSONIC:6000,LOITER:200,BALLISTIC:3000};
      const KM=1; // pass raw SVG units — engine uses theater-unit ranges
      // Include theater bases as state so engine range checks work
      const stateBasesPayload=bases.filter(b=>!b.hva).map(b=>({
        name:b.name, x:b.x*KM, y:b.y*KM,
        inventory:{'patriot-pac3':16,'nasams':8}
      }));
      const r=await fetch('http://localhost:8000/evaluate_advanced',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          state:{bases:stateBasesPayload},
          threats:[{id:`K-${myId}`,x:tgt.x*KM,y:tgt.y*KM,
                    speed_kmh:speedMap[weaponKey]||800,
                    estimated_type:typeMap[weaponKey]||'cruise-missile',
                    threat_value:70}],
          weather:'clear',doctrine_primary:'balanced',use_rl:true
        }),
        signal:AbortSignal.timeout(4000)
      });
      if(r.ok){
        const data=await r.json();
        const score=(data.strategic_consequence_score||0).toFixed(0);
        // BUG-K05 FIX: skip raw separator lines, strip trailing dashes from sitrep
        const sirepLines=(data.human_sitrep||'').split('\n').map(l=>l.trim()).filter(Boolean);
        const firstContent=sirepLines.find(l=>!l.match(/^[-—]+$/));
        const sitrep=(firstContent||'').replace(/^[-—\s]+|[-—\s]+$/g,'').substring(0,80);
        const eff=(data.tactical_assignments?.[0]?.effector||'N/A').toUpperCase();
        const base=(data.tactical_assignments?.[0]?.base||'N/A');
        log(`CORTEX-1: ${sitrep||'ASSESSMENT RECEIVED'}`,'i');
        log(`ENGINE → ${eff} from ${base} | STRATEGIC SCORE: ${score}`,'i');
      }
    }catch(e){}
  })();

  const k={
    done:false,
    _approved:false,
    _rejected:false,
    _manualBase:null,
    _sam1Fired:false,
    _sam2Fired:false,
    _state:'tracking',
    _threatInfo:kThreatInfo,
    _defBaseIds:kDefBaseIds,
    tick:()=>{
      frame++;
      const t=frame/totalFrames;

      // ── MISSILE POSITION ─────────────────────────────────────────────────
      const mx=spawnX+(tgtX-spawnX)*t;
      const mz=spawnZ+(tgtZ-spawnZ)*t;
      const peakY=wdef.alt*(1-t*t*0.3);
      const my=peakY*(1-t)+10000*t;
      mMesh.position.set(mx,my,mz);
      if(frame>1){
        const dir=new THREE.Vector3(tgtX-spawnX,0-spawnY,tgtZ-spawnZ).normalize();
        mMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
      }
      pushTrail(trail,mx,my,mz);
      updateKineticLabel(statusDiv,k._state,mx,mz);

      // ── SAM-1: early engagement at t>=0.05 (>= so missed windows are caught) ─
      if(outcome==='intercept' && defBases[0] && !k._sam1Fired && frame>=Math.floor(totalFrames*0.05)){
        // BUG-K03 FIX: use isWave flag instead of waveActive counter
        // waveActive<=1 incorrectly triggers HITL for the last wave missile
        if((CMD_MODE==='hitl'||CMD_MODE==='manual')&&!k._approved&&!k._rejected && !isWave){
          if(!SIM_PAUSED) freezeSim(k);
        } else if(!k._rejected){
          k._sam1Fired=true;
          // BUG-K04 FIX: use manually selected base if operator overrode it
          const launchBase = k._manualBase || defBases[0];
          spawnSAM(launchBase,'SAM-1');
          if(k._manualBase) log(`MANUAL OVERRIDE → LAUNCH FROM ${k._manualBase.name}`,'w');
        }
      }

      // ── SAM-2 SALVO: backup interceptor at t>=0.3 ───────────────────────
      if(outcome==='intercept' && defBases[1] && !k._sam2Fired && frame>=Math.floor(totalFrames*0.3) && !k._rejected && !k.done){
        k._sam2Fired=true;
        spawnSAM(defBases[1],'SAM-2 (SALVO)');
      }

      // ── HITL/MANUAL approval → immediate launch if SAM-1 hasn't auto-fired yet ─
      // Note: frame-based SAM-1 check runs before this in the same tick and
      // spawnSAM increments sams[], so sams.length===0 guard prevents duplicates.
      if(outcome==='intercept' && k._approved && sams.length===0){
        const launchBase = k._manualBase || defBases[0];
        if(launchBase) spawnSAM(launchBase,'SAM-1 (APPROVED)');
        if(defBases[1] && !k._manualBase) spawnSAM(defBases[1],'SAM-2 (SALVO/APPROVED)');
      }

      // ── UPDATE ALL ACTIVE SAMs ───────────────────────────────────────────
      let killConfirmed=false;
      const mPos=new THREE.Vector3(mx,my,mz);
      sams.forEach(sam=>{
        if(!sam.active||k.done) return;
        const iPos=sam.mesh.position;
        const distToMissile=iPos.distanceTo(mPos);

        // Predicted intercept point guidance — replaces PN
        const aim=aimPoint(iPos,INT_SPEED,frame);
        const dir=aim.clone().sub(iPos).normalize();
        sam.vel=dir.multiplyScalar(INT_SPEED);
        sam.mesh.position.add(sam.vel);
        sam.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
        pushTrail(sam.trail,iPos.x,iPos.y,iPos.z);

        // Radar lock state with re-acquisition (lostlock → locked if signal recovered)
        const hasLock=radarReturn(distToMissile,0.5)>P_MIN;
        if(hasLock  && k._state!=='killed')                       { k._state='locked';   }
        if(!hasLock && k._state==='locked' && distToMissile>50000){ k._state='lostlock'; log('RADAR LOST — PREDICTED TRACK ACTIVE','a'); }

        if(distToMissile<25000) killConfirmed=true;
      });

      // ── KILL RESOLUTION ──────────────────────────────────────────────────
      if(killConfirmed && !k.done){
        k.done=true; k._state='killed';
        updateKineticLabel(statusDiv,'killed',mx,mz);
        const mid=new THREE.Vector3(mx,my,mz);
        explode(mid,0x00f2ff,120); explode(mid,0xffffff,60);
        const kr=new THREE.Mesh(new THREE.RingGeometry(5000,25000,32),new THREE.MeshBasicMaterial({color:0x00f2ff,transparent:true,opacity:0.9,side:THREE.DoubleSide}));
        kr.rotation.x=-Math.PI/2; kr.position.copy(mid); scene.add(kr);
        let ks=1; const ki=setInterval(()=>{ ks+=0.2; kr.scale.set(ks,ks,1); kr.material.opacity-=0.06;
          if(kr.material.opacity<=0){clearInterval(ki);scene.remove(kr);} },30);
        scene.remove(mMesh); mMesh.geometry.dispose(); mMesh.material.dispose();
        sams.forEach(sam=>disposeSAM(sam));
        setTimeout(()=>{ scene.remove(trail.line); trail.line.geometry.dispose(); trail.line.material.dispose(); statusDiv.remove(); },3000);
        log(`NEUTRALIZED ${wdef.label} — INTERCEPT CONFIRMED`,'s');
        sKills++; waveActive=Math.max(0,waveActive-1); updateStats();
        return;
      }

      // ── IMPACT ───────────────────────────────────────────────────────────
      if(t>=1 && !k.done){
        k.done=true; k._state='impact';
        updateKineticLabel(statusDiv,'impact',tgtX,tgtZ);
        const impPos=new THREE.Vector3(tgtX,0,tgtZ);
        explode(impPos,0xff3e3e,160); explode(impPos,0xff8800,80);
        const ring=new THREE.Mesh(new THREE.RingGeometry(10000,40000,32),new THREE.MeshBasicMaterial({color:0xff3e3e,transparent:true,opacity:0.8,side:THREE.DoubleSide}));
        ring.rotation.x=-Math.PI/2; ring.position.set(tgtX,500,tgtZ); scene.add(ring);
        let rScale=1; const rIntvl=setInterval(()=>{ rScale+=0.15; ring.scale.set(rScale,rScale,1); ring.material.opacity-=0.05;
          if(ring.material.opacity<=0){clearInterval(rIntvl);scene.remove(ring);} },30);
        scene.remove(mMesh); mMesh.geometry.dispose(); mMesh.material.dispose();
        sams.forEach(sam=>disposeSAM(sam));
        setTimeout(()=>{ scene.remove(trail.line); trail.line.geometry.dispose(); trail.line.material.dispose(); statusDiv.remove(); },3000);
        log(`IMPACT AT ${tgt.name} — DEFENSE BREACH`,'a');
        sImpacts++; waveActive=Math.max(0,waveActive-1); updateStats();
      }
    }
  };
  kinetics.push(k);
}

// ── ANIMATION LOOP ────────────────────────────────────────────
const urlP = new URLSearchParams(window.location.search);
let currentTheater = urlP.get('theater') || 'sweden';
document.getElementById('sel-theater').value = currentTheater;
buildBases(currentTheater);

function animate(){
  requestAnimationFrame(animate);
  orbit.update();
  tickParticles(); // particles always animate even when frozen
  if(!SIM_PAUSED){
    for(let i=kinetics.length-1; i>=0; i--){
      const k=kinetics[i];
      if(!k.done) k.tick();
      else kinetics.splice(i,1);
    }
    baseMarkers.forEach((m,i)=>{if(i%2===0)m.rotation.y+=0.005;});
  }
  updateLabels();
  renderer.render(scene,camera);
}
animate();

// ── CONTROLS ──────────────────────────────────────────────────
document.getElementById('sel-theater').addEventListener('change',e=>{
  currentTheater=e.target.value;
  sceneLabels.forEach(l=>l.div.remove());sceneLabels.length=0;
  buildBases(currentTheater);
  log(`Theater switched: ${currentTheater.toUpperCase()}`, 'i');
});

document.getElementById('btn-fire').addEventListener('click',()=>{
  const w=document.getElementById('sel-weapon').value;
  const o=document.getElementById('sel-outcome').value;
  launchKinetic(currentTheater,w,o);
});

document.getElementById('btn-wave').addEventListener('click',()=>{
  const weps=['CRUISE','HYPERSONIC','LOITER','BALLISTIC','CRUISE'];
  // BUG-K07 FIX: wave outcome rate selector
  const rate=parseFloat(document.getElementById('sel-wave-rate').value);
  const outcomes=weps.map(()=>Math.random()<rate?'intercept':'miss');
  const nIntercept=outcomes.filter(o=>o==='intercept').length;
  waveActive=nIntercept; // only intercept-outcome missiles count (only they can contribute kills)
  weps.forEach((w,i)=>setTimeout(()=>launchKinetic(currentTheater,w,outcomes[i],true),i*800));
  log(`SATURATION WAVE INBOUND — ${weps.length} THREATS | DEF RATE ${Math.round(rate*100)}%`, 'a');
  if(rate<1) log(`LEAKERS EXPECTED: ${weps.length-nIntercept}`, 'w');
});

document.getElementById('btn-reset').addEventListener('click',()=>location.reload());

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

const SAAB_CH = new BroadcastChannel('saab_kinetic_v8');
SAAB_CH.onmessage = e => {
  if (e.data?.type === 'THREAT_SPAWN') {
    // Mirror the dashboard spawn in 3D Kinetic
    // We map 'intercept' or 'miss' based on a deterministic check or just show the trajectory
    launchKinetic(currentTheater, e.data.wkey, 'intercept'); 
    log(`DASHBOARD SYNC: INBOUND ${e.data.wkey} detected`, 'a');
  }
  if (e.data?.type === 'LAUNCH') {
    log('DASHBOARD SYNC: FULL ENGAGEMENT INITIALIZED', 'i');
  }
};

log('BOREAL KINETIC 3D READY — SELECT THEATER AND FIRE DEMO', 'i');
</script>
