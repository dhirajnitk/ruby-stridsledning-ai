<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BOREAL KINETIC 3D — INTERCEPT SIMULATOR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#010a12;font-family:'Courier New',monospace;color:#00f2ff;overflow:hidden;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:rgba(0,0,0,0.7);border-bottom:1px solid rgba(0,242,255,0.3)}
#hud h1{font-size:.7rem;letter-spacing:3px}
.controls{display:flex;gap:8px;align-items:center}
select,button{background:rgba(0,242,255,0.08);border:1px solid rgba(0,242,255,0.4);color:#00f2ff;font-family:'Courier New',monospace;font-size:.6rem;padding:6px 12px;cursor:pointer;border-radius:3px;letter-spacing:1px}
button:hover{background:rgba(0,242,255,0.2);box-shadow:0 0 10px rgba(0,242,255,0.3)}
button.red{border-color:rgba(255,62,62,0.6);color:#ff3e3e}
button.red:hover{background:rgba(255,62,62,0.15)}
button.green{border-color:rgba(0,255,136,0.6);color:#00ff88}
button.green:hover{background:rgba(0,255,136,0.1)}
#canvas-wrap{position:fixed;top:0;left:0;width:100%;height:100%}
#log{position:fixed;bottom:0;left:0;right:0;height:110px;background:rgba(0,0,0,0.8);border-top:1px solid rgba(0,242,255,0.2);padding:8px 16px;overflow-y:auto;z-index:10}
#log p{font-size:.52rem;line-height:1.6;letter-spacing:.5px}
.s{color:#00ff88}.a{color:#ff3e3e}.i{color:rgba(0,242,255,.55)}.w{color:#ffcc00}
#stats-hud{position:fixed;top:50px;right:16px;z-index:10;background:rgba(0,0,0,.7);border:1px solid rgba(0,242,255,.2);padding:12px;border-radius:4px;min-width:160px}
#stats-hud .sh{font-size:.45rem;color:#888;letter-spacing:1px;margin-bottom:4px}
#stats-hud .sv{font-size:1.1rem;font-weight:bold;margin-bottom:8px}
#label-overlay{position:fixed;top:50px;left:16px;z-index:10;pointer-events:none}
.lbl{position:absolute;font-size:.48rem;letter-spacing:1px;white-space:nowrap;text-shadow:0 0 6px currentColor;transform:translate(-50%,-50%)}
.klbl{position:absolute;font-size:.5rem;letter-spacing:2px;white-space:nowrap;font-weight:bold;transform:translate(-50%,-200%);padding:2px 6px;border-radius:2px;pointer-events:none}
.klbl.tracking{color:#ffcc00;border:1px solid rgba(255,204,0,.4);background:rgba(255,204,0,.08)}
.klbl.locked{color:#00ff88;border:1px solid rgba(0,255,136,.5);background:rgba(0,255,136,.1);animation:blink .5s infinite}
.klbl.lostlock{color:#ff3e3e;border:1px solid rgba(255,62,62,.5);background:rgba(255,62,62,.1)}
.klbl.killed{color:#00f2ff;border:1px solid #00f2ff;background:rgba(0,242,255,.15)}
.klbl.impact{color:#ff3e3e;border:1px solid #ff3e3e;background:rgba(255,62,62,.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#freeze-overlay{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(2px)}
#freeze-overlay.active{display:flex}
#freeze-banner{font-size:1.4rem;letter-spacing:6px;color:#ffcc00;text-shadow:0 0 20px rgba(255,204,0,.8);animation:blink .8s infinite;margin-bottom:12px}
#freeze-sub{font-size:.55rem;color:rgba(255,204,0,.7);letter-spacing:3px}
#freeze-btns{display:flex;gap:10px;margin-top:18px}
#freeze-btns button{padding:10px 24px;font-size:.65rem;letter-spacing:2px;cursor:pointer;border-radius:4px;font-family:'Courier New',monospace}
#btn-approve-k{background:rgba(0,255,136,.15);border:1px solid #00ff88;color:#00ff88}
#btn-reject-k{background:rgba(255,62,62,.12);border:1px solid #ff3e3e;color:#ff3e3e}
</style>
</head>
<body>
<div id="canvas-wrap"></div>

<div id="hud">
  <h1>⚡ BOREAL KINETIC 3D — INTERCEPT SIMULATOR</h1>
  <div class="controls">
    <select id="sel-theater">
      <option value="sweden">🇸🇪 SWEDEN THEATER</option>
      <option value="boreal">🛡 BOREAL THEATER</option>
    </select>
    <select id="sel-weapon">
      <option value="CRUISE">CRUISE MISSILE</option>
      <option value="HYPERSONIC">HYPERSONIC GLIDE</option>
      <option value="LOITER">LOITERING MUNITION</option>
      <option value="BALLISTIC">BALLISTIC MISSILE</option>
    </select>
    <select id="sel-outcome">
      <option value="intercept">INTERCEPT (HIT)</option>
      <option value="miss">MISS (IMPACT)</option>
    </select>
    <select id="sel-mode"><option value="auto">🤖 AUTO</option><option value="hitl">👤 HITL</option><option value="manual">🎯 MANUAL</option></select>
    <button class="green" id="btn-fire">▶ FIRE DEMO</button>
    <button class="red" id="btn-wave">⚡ SATURATION WAVE</button>
    <button id="btn-reset">↺ RESET</button>
    <button onclick="window.history.back()">◄ BACK</button>
  </div>
  <div id="stats-hud">
    <div class="sh">FIRED</div><div class="sv" id="s-fired" style="color:#00f2ff">0</div>
    <div class="sh">KILLS</div><div class="sv" id="s-kills" style="color:#00ff88">0</div>
    <div class="sh">IMPACTS</div><div class="sv" id="s-impacts" style="color:#ff3e3e">0</div>
  </div>
</div>

<!-- FREEZE OVERLAY -->
<div id="freeze-overlay">
  <div id="freeze-banner">⏸ TACTICAL FREEZE</div>
  <div id="freeze-sub">AWAITING COMMANDER DECISION</div>
  <div id="freeze-btns">
    <button id="btn-approve-k">✔ APPROVE INTERCEPT</button>
    <button id="btn-reject-k">✖ REJECT — HOLD FIRE</button>
  </div>
</div>

<div id="label-overlay"></div>
<div id="log"><div id="log-feed"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ── THEATER DATA ──────────────────────────────────────────────
const THEATERS = {
  sweden:[
    {id:'STO',name:'Stockholm (Capital)',x:0,y:0,hva:true},
    {id:'F21',name:'Luleå Air Base',x:185,y:691},
    {id:'F16',name:'Uppsala Air Base',x:-27,y:63},
    {id:'GOT',name:'Gotland Visby Hub',x:16,y:-186},
    {id:'F17',name:'Ronneby Air Base',x:-172,y:-340},
    {id:'GBG',name:'Gothenburg Port',x:-364,y:-180,hva:true},
  ],
  boreal:[
    // NORTH SIDE
    {id:'ARK',name:'Arktholm Capital',  x:418, y:95,   hva:true},
    {id:'NVB',name:'Northern Vanguard', x:198, y:335},
    {id:'HRC',name:'Highridge Command', x:838, y:75},
    {id:'BWP',name:'Boreal Watch Post', x:1158,y:385},
    {id:'VAL',name:'Valbrek',           x:1423,y:213,  hva:true},
    {id:'NRD',name:'Nordvik',           x:140, y:323,  hva:true},
    // SOUTH SIDE
    {id:'MER',name:'Meridia Capital',   x:1225,y:1208, hva:true},
    {id:'FWS',name:'Firewatch Station', x:1398,y:1071},
    {id:'SRB',name:'Southern Redoubt',  x:321, y:1238},
    {id:'SPB',name:'Spear Point Base',  x:918, y:835},
    {id:'CAL',name:'Callhaven',         x:96,  y:1150, hva:true},
    {id:'SOL',name:'Solano',            x:576, y:1236, hva:true},
    // TERRAIN NODES
    {id:'NML',name:'North Mainland',    x:820, y:295,  zone:true},
    {id:'SML',name:'South Mainland',    x:823, y:1075, zone:true},
    {id:'NIW',name:'N-Island West',     x:656, y:493,  zone:true},
    {id:'NIE',name:'N-Island East',     x:1156,y:388,  zone:true},
    {id:'NRI',name:'North Remote Is.',  x:303, y:626,  zone:true},
    {id:'SFI',name:'South Forward Is.', x:1408,y:753,  zone:true},
    {id:'SSI',name:'South Small Is.',   x:423, y:920,  zone:true},
    {id:'SCP',name:'South Peninsula',   x:898, y:828,  zone:true},
    {id:'BST',name:'Boreal Strait',     x:833, y:650,  zone:true},
  ]
};
const WEAPONS={
  CRUISE:    {speed:1.2,color:0xff3e3e,trail:'#ff3e3e',label:'CRUISE',alt:60000},
  HYPERSONIC:{speed:4.0,color:0xffcc00,trail:'#ffcc00',label:'HYPERSONIC',alt:120000},
  LOITER:    {speed:0.6,color:0xff00ff,trail:'#ff00ff',label:'LOITER',alt:30000},
  BALLISTIC: {speed:2.5,color:0xff5500,trail:'#ff5500',label:'BALLISTIC',alt:180000},
};

// ── SCENE SETUP ───────────────────────────────────────────────
const wrap=document.getElementById('canvas-wrap');
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x010a12);
scene.fog=new THREE.Fog(0x010a12,2000000,8000000);

const W=window.innerWidth, H=window.innerHeight;
const camera=new THREE.PerspectiveCamera(55,W/H,1000,12000000);
camera.position.set(0,600000,1200000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(devicePixelRatio);
wrap.appendChild(renderer.domElement);

const orbit=new THREE.OrbitControls(camera,renderer.domElement);
orbit.enableDamping=true;orbit.dampingFactor=0.06;
orbit.minDistance=50000;orbit.maxDistance=5000000;

// Lighting
scene.add(new THREE.AmbientLight(0x0a1a2a,2));
const dlight=new THREE.DirectionalLight(0x00f2ff,0.4);
dlight.position.set(500000,800000,300000);
scene.add(dlight);

// Stars
(()=>{
  const sg=new THREE.BufferGeometry();
  const sv=[];for(let i=0;i<3000;i++){
    sv.push((Math.random()-0.5)*10000000,(Math.random()-0.5)*10000000,(Math.random()-0.5)*10000000);
  }
  sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:800,transparent:true,opacity:0.6})));
})();

// ── GRID / GROUND ─────────────────────────────────────────────
const gridH=new THREE.GridHelper(2000000,40,0x003344,0x001122);
gridH.position.y=0;
scene.add(gridH);

// ── BASE MARKERS ──────────────────────────────────────────────
let baseMarkers=[];
function buildBases(theater){
  baseMarkers.forEach(m=>scene.remove(m));baseMarkers=[];
  THEATERS[theater].forEach(b=>{
    const sc=1000;
    const geo=new THREE.CylinderGeometry(0,12000,28000,6);
    const col=b.hva?0x00ff88:0x00f2ff;
    const mesh=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:col,wireframe:true}));
    mesh.position.set(b.x*sc,0,-b.y*sc);
    scene.add(mesh);baseMarkers.push(mesh);

    // Glow ring
    const ring=new THREE.Mesh(
      new THREE.TorusGeometry(20000,1200,8,32),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.4})
    );
    ring.rotation.x=Math.PI/2;
    ring.position.set(b.x*sc,100,-b.y*sc);
    scene.add(ring);baseMarkers.push(ring);

    // Label
    addLabel(b.name,b.x*sc,-b.y*sc,col);
  });
}

// ── DOM LABELS ────────────────────────────────────────────────
const labelOverlay=document.getElementById('label-overlay');
const sceneLabels=[];
function addLabel(text,wx,wz,col){
  const div=document.createElement('div');
  div.className='lbl';
  div.textContent=text;
  div.style.color=`#${col.toString(16).padStart(6,'0')}`;
  labelOverlay.appendChild(div);
  sceneLabels.push({div,wx,wz});
}
function updateLabels(){
  sceneLabels.forEach(({div,wx,wz})=>{
    const v=new THREE.Vector3(wx,0,wz);
    v.project(camera);
    const px=(v.x*.5+.5)*window.innerWidth;
    const py=(-.5*v.y+.5)*window.innerHeight-20;
    div.style.left=px+'px';div.style.top=py+'px';
    div.style.display=v.z<1?'block':'none';
  });
}

// ── LOGGING ───────────────────────────────────────────────────
const logFeed=document.getElementById('log-feed');
function log(msg,cls='i'){
  const p=document.createElement('p');
  p.className=cls;p.textContent='> '+msg;
  logFeed.prepend(p);
  while(logFeed.children.length>40)logFeed.removeChild(logFeed.lastChild);
}

// ── STATS ─────────────────────────────────────────────────────
let sFired=0,sKills=0,sImpacts=0;
function updateStats(){
  document.getElementById('s-fired').textContent=sFired;
  document.getElementById('s-kills').textContent=sKills;
  document.getElementById('s-impacts').textContent=sImpacts;
}

// ── PARTICLE EXPLOSION ────────────────────────────────────────
const particles=[];
function explode(pos,col,count=80){
  const geo=new THREE.BufferGeometry();
  const verts=[];const vels=[];
  for(let i=0;i<count;i++){
    verts.push(pos.x,pos.y,pos.z);
    vels.push((Math.random()-.5)*60000,(Math.random()-.5)*60000,(Math.random()-.5)*60000);
  }
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({color:col,size:5000,transparent:true,opacity:1}));
  scene.add(pts);
  particles.push({pts,vels,life:1.0});
}

function tickParticles(){
  particles.forEach((p,i)=>{
    p.life-=0.025;
    if(p.life<=0){scene.remove(p.pts);particles.splice(i,1);return;}
    const pos=p.pts.geometry.attributes.position.array;
    for(let j=0;j<pos.length;j+=3){
      pos[j]+=p.vels[j/3*3];pos[j+1]+=p.vels[j/3*3+1];pos[j+2]+=p.vels[j/3*3+2];
    }
    p.pts.geometry.attributes.position.needsUpdate=true;
    p.pts.material.opacity=p.life;
  });
}

// ── TRAIL SYSTEM ──────────────────────────────────────────────
function makeTrail(color,length=40){
  const positions=new Float32Array(length*3);
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  const mat=new THREE.LineBasicMaterial({color,transparent:true,opacity:0.7,linewidth:2});
  const line=new THREE.Line(geo,mat);
  scene.add(line);
  return{line,positions,ptr:0,length};
}
function pushTrail(trail,x,y,z){
  const p=trail.positions;
  for(let i=p.length-3;i>=3;i-=3){p[i]=p[i-3];p[i+1]=p[i-2];p[i+2]=p[i-1];}
  p[0]=x;p[1]=y;p[2]=z;
  trail.line.geometry.attributes.position.needsUpdate=true;
}

// ── FREEZE & MODE STATE ──────────────────────────────────────
let SIM_PAUSED = false;
let CMD_MODE = 'auto';
let pendingKinetic = null;

const freezeOverlay = document.getElementById('freeze-overlay');

function freezeSim(k) {
  if (SIM_PAUSED) return;
  SIM_PAUSED = true;
  pendingKinetic = k;
  freezeOverlay.classList.add('active');
  log('TACTICAL FREEZE — AWAITING COMMANDER', 'w');
}
function resumeSim() {
  SIM_PAUSED = false;
  pendingKinetic = null;
  freezeOverlay.classList.remove('active');
  log('SIMULATION RESUMED', 'i');
}

document.getElementById('btn-approve-k').addEventListener('click', () => {
  if (pendingKinetic) { pendingKinetic._approved = true; }
  resumeSim();
});
document.getElementById('btn-reject-k').addEventListener('click', () => {
  if (pendingKinetic) { pendingKinetic._rejected = true; }
  resumeSim();
  log('INTERCEPT REJECTED — THREAT CONTINUES', 'a');
});
document.getElementById('sel-mode').addEventListener('change', e => {
  CMD_MODE = e.target.value;
  log(`MODE: ${CMD_MODE.toUpperCase()}`, 'i');
});

// Radar physics constants (from mega_data_factory.py)
const PT=100e3, G=Math.pow(10,3), WL=0.03, P_MIN=1e-14;
function radarReturn(range, rcs) {
  if(range<=0) return 0;
  return (PT*G*G*WL*WL*rcs)/(Math.pow(4*Math.PI,3)*Math.pow(range,4));
}

// Floating missile status labels
const kineticLabels = [];
function addKineticLabel(id) {
  const div = document.createElement('div');
  div.className = 'klbl tracking';
  div.id = 'klbl-'+id;
  div.textContent = '◉ TRACKING';
  document.getElementById('label-overlay').appendChild(div);
  return div;
}
function updateKineticLabel(div, state, wx, wz) {
  if (!div) return;
  const v = new THREE.Vector3(wx, 0, wz);
  v.project(camera);
  div.style.left = (v.x*.5+.5)*window.innerWidth+'px';
  div.style.top = (-.5*v.y+.5)*window.innerHeight+'px';
  div.style.display = v.z<1?'block':'none';
  div.className = 'klbl '+state;
  const labels = {tracking:'◉ TRACKING',locked:'🔒 LOCKED',lostlock:'⚠ LOST LOCK',killed:'💥 KILLED',impact:'☠ IMPACT'};
  div.textContent = labels[state] || state;
}

// ── ACTIVE KINETICS ───────────────────────────────────────────
const kinetics=[];
let kId=0;

function launchKinetic(theater,weaponKey,outcome){
  const bases=THEATERS[theater];
  const tgt=bases[Math.floor(Math.random()*bases.length)];
  const wdef=WEAPONS[weaponKey];
  const SC=1000;

  // Spawn from random edge
  const angle=Math.random()*Math.PI*2;
  const dist=800000+Math.random()*400000;
  const spawnX=tgt.x*SC+Math.cos(angle)*dist;
  const spawnZ=-tgt.y*SC+Math.sin(angle)*dist;
  const spawnY=wdef.alt*(0.5+Math.random()*0.5);

  const tgtX=tgt.x*SC, tgtZ=-tgt.y*SC;

  // Missile mesh
  const mGeo=new THREE.ConeGeometry(5000,20000,8);
  const mMesh=new THREE.Mesh(mGeo,new THREE.MeshBasicMaterial({color:wdef.color,wireframe:false}));
  scene.add(mMesh);
  const trail=makeTrail(wdef.color);

  const totalFrames=220;
  let frame=0;
  let interceptor=null, intTrail=null;
  let interceptLaunched=false;

  // If intercept, pick a nearby defender base
  let defBase=null;
  if(outcome==='intercept'){
    defBase=bases.find(b=>b.type!=='HVA'&&!b.hva) || bases[0];
  }

  const myId = kId++;
  const statusDiv = addKineticLabel(myId);
  log(`TRACKING ${wdef.label} → ${tgt.name}`, 'w');

  const k={
    done:false,
    _approved: false,
    _rejected: false,
    _state: 'tracking', // tracking | locked | lostlock | killed | impact
    tick:()=>{
      frame++;
      const t=frame/totalFrames;

      const mx=spawnX+(tgtX-spawnX)*t;
      const mz=spawnZ+(tgtZ-spawnZ)*t;
      const peakY=wdef.alt*(1-t*t*0.3);
      const my=peakY*(1-t)+10000*t;
      mMesh.position.set(mx,my,mz);
      if(frame>1){
        const dir=new THREE.Vector3(tgtX-spawnX,0-spawnY,tgtZ-spawnZ).normalize();
        mMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
      }
      pushTrail(trail,mx,my,mz);
      updateKineticLabel(statusDiv, k._state, mx, mz);

      // HITL/Manual freeze point: when entering kill zone
      if(outcome==='intercept' && !interceptLaunched && t>0.4){
        if((CMD_MODE==='hitl'||CMD_MODE==='manual') && !k._approved && !k._rejected){
          if(!SIM_PAUSED) freezeSim(k);
          return; // hold here until approved
        }
        if(!k._rejected){
          interceptLaunched=true;
          const dbx=defBase.x*SC, dbz=-defBase.y*SC;
          const iGeo=new THREE.ConeGeometry(4000,16000,6);
          interceptor=new THREE.Mesh(iGeo,new THREE.MeshBasicMaterial({color:0x00f2ff}));
          scene.add(interceptor);
          intTrail=makeTrail(0x00f2ff);
          interceptor.position.set(dbx,5000,dbz);
          interceptor._vel=new THREE.Vector3(mx-dbx,my-5000,mz-dbz).normalize().multiplyScalar(800*10);
          log(`SAM LAUNCHED from ${defBase.name}`, 's');
          sFired++;updateStats();
        }
      }

      // PN Guidance + Radar Lock State Machine
      if(interceptor){
        const r_m=interceptor.position;
        const v_m=interceptor._vel||new THREE.Vector3(0,1000,0);
        const r_t=new THREE.Vector3(mx,my,mz);
        const v_t=new THREE.Vector3(tgtX-spawnX,0-spawnY,tgtZ-spawnZ).normalize().multiplyScalar(wdef.speed*1000/60);
        const r_tm=r_t.clone().sub(r_m);
        const dist=r_tm.length();
        const unit_los=r_tm.clone().normalize();
        const v_tm=v_t.clone().sub(v_m);

        // Radar lock check (R^4 physics from data factory)
        const P_r = radarReturn(dist, 0.5);
        const hasLock = P_r > P_MIN;
        if(hasLock && k._state==='tracking') { k._state='locked'; log('RADAR LOCK ACQUIRED','s'); }
        if(!hasLock && k._state==='locked')  { k._state='lostlock'; log('RADAR LOCK LOST — FLYING BLIND','a'); }

        if(hasLock){
          const N=4.0;
          const omega=new THREE.Vector3().crossVectors(r_tm,v_tm).divideScalar(dist*dist);
          const cv=-v_tm.dot(unit_los);
          const a_c=new THREE.Vector3().crossVectors(omega,unit_los).multiplyScalar(N*cv);
          v_m.add(a_c.multiplyScalar(1/60));
        }
        v_m.normalize().multiplyScalar(800*10);
        interceptor._vel=v_m;
        interceptor.position.add(v_m);
        interceptor.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),v_m.clone().normalize());
        pushTrail(intTrail,r_m.x,r_m.y,r_m.z);

        if(dist<15000){
          k._state='killed';
          updateKineticLabel(statusDiv,'killed',mx,mz);
          const mid=new THREE.Vector3(mx,my,mz);
          explode(mid,0x00f2ff,120); explode(mid,0xffffff,60);
          // Secondary ring at kill point
          const kr=new THREE.Mesh(new THREE.RingGeometry(5000,25000,32),new THREE.MeshBasicMaterial({color:0x00f2ff,transparent:true,opacity:0.9,side:THREE.DoubleSide}));
          kr.rotation.x=-Math.PI/2; kr.position.copy(mid); scene.add(kr);
          let ks=1; const ki=setInterval(()=>{ ks+=0.2; kr.scale.set(ks,ks,1); kr.material.opacity-=0.06;
            if(kr.material.opacity<=0){clearInterval(ki);scene.remove(kr);} },30);
          scene.remove(mMesh); scene.remove(interceptor);
          setTimeout(()=>{ scene.remove(trail.line); if(intTrail)scene.remove(intTrail.line); statusDiv.remove(); },3000);
          log(`NEUTRALIZED ${wdef.label} — INTERCEPT CONFIRMED`,'s');
          sKills++; updateStats(); k.done=true;
        }
      }

      if(t>=1){
        k._state='impact';
        updateKineticLabel(statusDiv,'impact',tgtX,tgtZ);
        const impPos=new THREE.Vector3(tgtX,0,tgtZ);
        explode(impPos,0xff3e3e,160); explode(impPos,0xff8800,80);
        const ring=new THREE.Mesh(new THREE.RingGeometry(10000,40000,32),new THREE.MeshBasicMaterial({color:0xff3e3e,transparent:true,opacity:0.8,side:THREE.DoubleSide}));
        ring.rotation.x=-Math.PI/2; ring.position.set(tgtX,500,tgtZ); scene.add(ring);
        let rScale=1; const rIntvl=setInterval(()=>{ rScale+=0.15; ring.scale.set(rScale,rScale,1); ring.material.opacity-=0.05;
          if(ring.material.opacity<=0){clearInterval(rIntvl);scene.remove(ring);} },30);
        scene.remove(mMesh);
        setTimeout(()=>{ scene.remove(trail.line); statusDiv.remove(); },3000);
        log(`IMPACT AT ${tgt.name} — DEFENSE BREACH`,'a');
        sImpacts++; updateStats(); k.done=true;
      }
    }
  };
  kinetics.push(k);
}

// ── ANIMATION LOOP ────────────────────────────────────────────
const urlP = new URLSearchParams(window.location.search);
let currentTheater = urlP.get('theater') || 'sweden';
document.getElementById('sel-theater').value = currentTheater;
buildBases(currentTheater);

function animate(){
  requestAnimationFrame(animate);
  orbit.update();
  tickParticles(); // particles always animate even when frozen
  if(!SIM_PAUSED){
    kinetics.forEach((k,i)=>{if(!k.done)k.tick();else kinetics.splice(i,1);});
    baseMarkers.forEach((m,i)=>{if(i%2===0)m.rotation.y+=0.005;});
  }
  updateLabels();
  renderer.render(scene,camera);
}
animate();

// ── CONTROLS ──────────────────────────────────────────────────
document.getElementById('sel-theater').addEventListener('change',e=>{
  currentTheater=e.target.value;
  sceneLabels.forEach(l=>l.div.remove());sceneLabels.length=0;
  buildBases(currentTheater);
  log(`Theater switched: ${currentTheater.toUpperCase()}`, 'i');
});

document.getElementById('btn-fire').addEventListener('click',()=>{
  const w=document.getElementById('sel-weapon').value;
  const o=document.getElementById('sel-outcome').value;
  launchKinetic(currentTheater,w,o);
});

document.getElementById('btn-wave').addEventListener('click',()=>{
  const weps=['CRUISE','HYPERSONIC','LOITER','BALLISTIC','CRUISE'];
  const outcomes=['intercept','intercept','miss','intercept','miss'];
  weps.forEach((w,i)=>setTimeout(()=>launchKinetic(currentTheater,w,outcomes[i]),i*800));
  log('SATURATION WAVE INBOUND — MULTI-VECTOR ENGAGEMENT', 'a');
});

document.getElementById('btn-reset').addEventListener('click',()=>location.reload());

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

const SAAB_CH = new BroadcastChannel('saab_kinetic_v8');
SAAB_CH.onmessage = e => {
  if (e.data?.type === 'THREAT_SPAWN') {
    // Mirror the dashboard spawn in 3D Kinetic
    // We map 'intercept' or 'miss' based on a deterministic check or just show the trajectory
    launchKinetic(currentTheater, e.data.wkey, 'intercept'); 
    log(`DASHBOARD SYNC: INBOUND ${e.data.wkey} detected`, 'a');
  }
  if (e.data?.type === 'LAUNCH') {
    log('DASHBOARD SYNC: FULL ENGAGEMENT INITIALIZED', 'i');
  }
};

log('BOREAL KINETIC 3D READY — SELECT THEATER AND FIRE DEMO', 'i');
</script>
